name: Release candidate

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-candidate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Verify and assemble
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
        with:
          run_install: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          cache: pnpm
          node-version-file: .node-version
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium firefox webkit
      - run: pnpm release:candidate
      - name: Upload private release-candidate artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: snap-motion-release-candidate
          path: |
            .artifacts/packages/*.tgz
            .artifacts/release/SHA256SUMS
            .artifacts/release/release-manifest.json
            etc/*.api.md
          if-no-files-found: error
          retention-days: 14
